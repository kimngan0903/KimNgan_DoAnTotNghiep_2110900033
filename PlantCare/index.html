<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trang chủ</title>
    <!-- Bootstrap -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.2.0/css/all.min.css">

    <!-- Css -->
     <link rel="stylesheet" href="./css/styles.css">
</head>
<body>
    
    <header>
        <a class="navbar-brand">
            <img class="logo" src="images/logo/logo.jpg" alt="logo" style="width: 90px; height: 60px"/>
        </a>
        <nav class="navbar">
            <a href="index.html" class="link">Trang chủ </a>
            <a href="aboutus.html" class="link">Giới thiệu</a>
            <a href="product.html" class="link">Sản phẩm</a>
            <a href="" class="link">Tin tức</a>
            <a href="" class="link">Đối tác</a>
            <a href="" class="link">Liên hệ</a>
        </nav>
        <div class="group-icon">
            <form class="d-flex" role="search">
                <input class="form-control me-2" type="search" placeholder="Search" aria-label="Search">
                <button class="btn btn-outline-success"><i class="fa-solid fa-magnifying-glass"></i></button>
            </form>
        </div>
        <div class="group-icon">
            <div class="icon icon-cart">
                <a href="cart.html" class="header-auth-text account">
                    <i class="fa-solid fa-cart-shopping" style="font-size:20px; color: #fff;"></i>
                </a>
            </div>
        </div>
            <!-- Icon người với dropdown -->
            <div class="dropdow">
                <a href="#" class="header-auth-text account">
                    <i class="fa fa-user-tie" style="font-size:20px; color: #fff;"></i>
                </a>
                <ul class="dropdow-list" style="background:none;">
                    <li><a class="dropdown-item" href="login.html">Đăng nhập</a></li>
                    <li><a class="dropdown-item" href="register.html">Đăng ký</a></li>
                </ul>
            </div>
            
        </div>
    </header>
        
    <div id="carouselExampleAutoplaying" class="carousel slide" data-bs-ride="carousel">
        <div class="carousel-inner">
          <div class="carousel-item active">
            <img src="./images/banner/banner-1.jpg" class="d-block w-100" alt="...">
            
          </div>
          <div class="carousel-item">
            <img src="./images/banner/banner-2.jpg" class="d-block w-100" alt="...">
          </div>
          <div class="carousel-item">
            <img src="./images/banner/banner-3.jpg" class="d-block w-100" alt="...">
          </div>
        </div>
        <button class="carousel-control-prev" type="button" data-bs-target="#carouselExampleAutoplaying" data-bs-slide="prev">
          <span class="carousel-control-prev-icon" aria-hidden="true"></span>
          <span class="visually-hidden">Previous</span>
        </button>
        <button class="carousel-control-next" type="button" data-bs-target="#carouselExampleAutoplaying" data-bs-slide="next">
          <span class="carousel-control-next-icon" aria-hidden="true"></span>
          <span class="visually-hidden">Next</span>
        </button>
      </div>
    
    <!-- Bootstrap -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
